version: '3.8'

services:
  agave-db:
    image: postgres:16-alpine
    container_name: agave_postgres
    environment:
      POSTGRES_DB: agave_erp
      POSTGRES_USER: agave_admin
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    restart: always

  discovery-service:
    build: ./services/discovery
    container_name: agave-discovery
    ports:
      - "8761:8761"
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway-service:
    build: ./services/gateway
    container_name: agave-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://agave-discovery:8761/eureka/
      - JAVA_OPTS=-Xmx256m -Xms256m
    depends_on:
      - discovery-service

  identity-service:
    build: ./services/identity
    container_name: agave-identity
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://agave-discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://agave-db:5432/agave_erp
      - JAVA_OPTS=-Xmx256m -Xms256m
    depends_on:
      - discovery-service
      - agave-db

  core-backend:
    build: ./backend
    container_name: agave-core
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://agave-discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://agave-db:5432/agave_erp
      - JAVA_OPTS=-Xmx256m -Xms256m
    depends_on:
      - discovery-service
      - agave-db

volumes:
  postgres_data_v2:
