version: '3.8'

services:

  agave-db:
    image: postgres:16-alpine
    container_name: agave_postgres
    environment:
      POSTGRES_DB: agave_erp
      POSTGRES_USER: agave_admin
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agave_admin -d agave_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  agave-api:
    build: ./backend
    container_name: agave_api
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=jdbc:postgresql://agave-db:5432/agave_erp
      - DATABASE_USER=agave_admin
      - DATABASE_PASSWORD=secure_password_123
      - OTEL_ENDPOINT=http://otel-collector:4318
      - TENANT_ID=tenant-1
      - ENVIRONMENT=local
    depends_on:
      agave-db:
        condition: service_healthy
    restart: always

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: agave_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./services/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8889:8889"   # Prometheus metrics del collector
    depends_on:
      - agave-api

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: agave_prometheus
    volumes:
      - ./services/observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - agave-api

  grafana:
    image: grafana/grafana:11.3.0
    container_name: agave_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=agave123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data: