services:
  postgres:
    image: postgres:16-alpine
    container_name: agave-postgres
    environment:
      POSTGRES_DB: agave_erp
      POSTGRES_USER: agave_user
      POSTGRES_PASSWORD: agave_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
