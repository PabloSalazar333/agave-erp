server:
  port: 8081

spring:
  application:
    name: agave-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agave_erp}
    username: ${DATABASE_USER:agave_admin}
    password: ${DATABASE_PASSWORD:secure_password_123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: AgaveHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: agave-api
      tenant: ${TENANT_ID:default}
  tracing:
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4318}
      protocol: http/protobuf
  resource:
    attributes:
      service.name: agave-api
      service.version: 0.0.1
      deployment.environment: ${ENVIRONMENT:local}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:agave-secret-key-development-only-change-in-production}
  expiration: 86400000

info:
  app:
    name: agave-api
    version: 0.0.1-SNAPSHOT