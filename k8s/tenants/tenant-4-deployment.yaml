apiVersion: apps/v1
kind: Deployment
metadata:
  name: agave-api
  namespace: agave-tenant-4
  labels:
    app: agave-api
    tenant: tenant-4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agave-api
      tenant: tenant-4
  template:
    metadata:
      labels:
        app: agave-api
        tenant: tenant-4
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: agave-api
          image: us-central1-docker.pkg.dev/agave-erp-gke/agave-repo/agave-api:latest
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agave-secrets
                  key: DATABASE_URL
            - name: DATABASE_USER
              value: "postgres"
            - name: DATABASE_PASSWORD
              value: "CBsiXzTyetjyaHwSfhbeNVcgDyLAGbQa"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agave-secrets
                  key: JWT_SECRET
            - name: TENANT_ID
              value: "tenant-4"
            - name: ENVIRONMENT
              value: "gke"
            - name: OTEL_SDK_DISABLED
              value: "false"
            - name: OTEL_ENDPOINT
              value: "http://otel-collector.agave-observability.svc.cluster.local:4318"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: agave-api
  namespace: agave-tenant-4
  labels:
    app: agave-api
    tenant: tenant-4
spec:
  selector:
    app: agave-api
    tenant: tenant-4
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: LoadBalancer
